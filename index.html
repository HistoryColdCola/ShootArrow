<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>草原射箭 · 长按蓄力 · 双端完美</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* 关键：全局禁用触摸动作导致的滚动/缩放/长按菜单 */
            touch-action: manipulation;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1f5e3a 0%, #2b7a4b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            padding: 12px;
            box-sizing: border-box;
            touch-action: pan-y pinch-zoom; /* 允许整体轻微上下滑动，但canvas内会覆盖 */
        }

        .game-container {
            background: #2d2b1f;
            border-radius: 48px;
            padding: 16px 18px 22px 18px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border-bottom: 6px solid #a77b2e;
            width: 100%;
            max-width: 1000px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            cursor: crosshair;
            background: #7ea86a;
            width: 100%;
            height: auto;
            aspect-ratio: 1000 / 550;
            /* 关键：canvas内部完全禁止触摸滚动/缩放 */
            touch-action: none;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 10px;
            background: #2c2418cc;
            backdrop-filter: blur(4px);
            padding: 10px 16px;
            border-radius: 60px;
            border: 1px solid #ebc28e;
        }

        .score-board, .power-board, .message-area {
            background: #1f1a10;
            padding: 5px 16px;
            border-radius: 40px;
            color: #ffe6b3;
            text-shadow: 0 2px 2px black;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .score-board span, .power-board span {
            color: #ffd966;
            font-size: 1.5rem;
            margin-right: 6px;
        }

        .power-value {
            font-family: monospace;
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffaa33;
        }

        .message-area {
            background: #000000aa;
            font-size: 0.8rem;
            min-width: 140px;
            text-align: center;
        }

        button {
            background: #e0a82b;
            border: none;
            font-family: inherit;
            font-weight: bold;
            padding: 8px 22px;
            border-radius: 60px;
            font-size: 0.9rem;
            color: #2c1c05;
            cursor: pointer;
            box-shadow: 0 4px 0 #7a4c1a;
            transition: 0.07s linear;
            touch-action: manipulation;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7a4c1a;
        }

        .tips {
            font-size: 0.7rem;
            background: #00000066;
            padding: 6px 14px;
            border-radius: 50px;
            color: #ffecb3;
            text-align: center;
        }
        /* 避免iOS长按弹出菜单 */
        *:not(input):not(textarea) {
            -webkit-touch-callout: none;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="archeryCanvas" width="1000" height="550" style="width:100%; height:auto; max-width:1000px; aspect-ratio:1000/550"></canvas>
        <div class="info-panel">
            <div class="score-board">🏹 战绩 <span id="scoreValue">0</span></div>
            <div class="power-board">⚡ 蓄力威力 <span class="power-value" id="powerPercent">0</span>%</div>
            <div class="message-area" id="statusMsg">✨ 长按屏幕蓄力 ✨</div>
            <button id="resetBtn">🌾 重置草原 🌾</button>
        </div>
        <div class="tips">
            💡 <strong>手机/电脑通用</strong>：长按蓄力 → 威力越大晃动越剧烈 → 松开即射箭！ 靶子会逐渐消失~
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- canvas 元素 ----------
        const canvas = document.getElementById('archeryCanvas');
        const ctx = canvas.getContext('2d');

        // ---------- 游戏配置 ----------
        const TARGETS_COUNT = 8;      // 8个靶子，适中数量
        let targets = [];
        let score = 0;
        
        // 弓箭/蓄力相关
        let isCharging = false;        // 正在长按蓄力
        let power = 0;                 // 0-100
        let chargeStartTime = 0;
        
        // 蓄力时恍惚不定的偏移量 (模拟晃动)
        let aimOffsetX = 0;
        let aimOffsetY = 0;
        
        // 弓箭手坐标 (左下方)
        const archerX = 120;
        const archerY = 470;
        const targetBaseRadius = 28;
        
        // UI 消息
        let messageTimer = null;
        
        // 箭矢飞行特效
        let isFlying = false;
        let arrowFlight = {
            active: false,
            startX: archerX,
            startY: archerY,
            targetX: 0,
            targetY: 0,
            progress: 0,
            hitTargetIdx: -1
        };
        
        // 命中特效
        let hitEffect = { active: false, x: 0, y: 0, timer: 0 };
        
        // 当前瞄准点 (鼠标/手指实时坐标)
        let aimX = canvas.width / 2;
        let aimY = canvas.height / 2;
        
        // 确保canvas尺寸初始化正确 (解决手机端坐标比例)
        function resizeCanvas() {
            // 逻辑尺寸固定1000x550，无需额外操作，但确保getBoundingClientRect正确
        }
        window.addEventListener('resize', resizeCanvas);
        
        // ---------- 辅助函数 ----------
        function randomRange(min, max) {
            return min + Math.random() * (max - min);
        }
        
        // 生成靶子，避免重叠
        function generateTargets() {
            let newTargets = [];
            for(let i = 0; i < TARGETS_COUNT; i++) {
                let overlap = true;
                let attempts = 0;
                let x, y;
                while(overlap && attempts < 200) {
                    x = randomRange(380, 920);
                    y = randomRange(140, 450);
                    overlap = false;
                    if(Math.hypot(x - archerX, y - archerY) < 110) overlap = true;
                    for(let t of newTargets) {
                        if(Math.hypot(t.x - x, t.y - y) < 55) { overlap = true; break; }
                    }
                    attempts++;
                }
                newTargets.push({
                    x: x, y: y, radius: targetBaseRadius,
                    points: 10,
                    hit: false,
                });
            }
            return newTargets;
        }
        
        function resetGame() {
            score = 0;
            updateScoreUI();
            targets = generateTargets();
            cancelCharge();
            isFlying = false;
            arrowFlight.active = false;
            hitEffect.active = false;
            setMessage("🌾 按住屏幕长蓄力！晃动中射中靶心 🌾");
            updatePowerUI(0);
            power = 0;
            isCharging = false;
            aimOffsetX = 0;
            aimOffsetY = 0;
        }
        
        function cancelCharge() {
            if(isCharging) {
                isCharging = false;
                power = 0;
                updatePowerUI(0);
            }
        }
        
        function updateCharge(currentTime) {
            if(!isCharging) return;
            let elapsed = Math.min((currentTime - chargeStartTime) / 1200, 1.0);
            let newPower = Math.floor(elapsed * 100);
            if(newPower !== power) {
                power = newPower;
                updatePowerUI(power);
            }
            if(power >= 100) {
                power = 100;
                updatePowerUI(100);
            }
        }
        
        function updatePowerUI(val) {
            const powerSpan = document.getElementById('powerPercent');
            if(powerSpan) powerSpan.innerText = val;
            let powerBoard = document.querySelector('.power-board');
            if(powerBoard) {
                let intensity = val / 100;
                powerBoard.style.boxShadow = `0 0 ${8 + intensity * 14}px #ffaa33`;
            }
        }
        
        function updateScoreUI() {
            document.getElementById('scoreValue').innerText = score;
        }
        
        function setMessage(msg, isError = false) {
            if(messageTimer) clearTimeout(messageTimer);
            const msgDiv = document.getElementById('statusMsg');
            if(msgDiv) {
                msgDiv.innerHTML = msg;
                msgDiv.style.color = isError ? "#ffb347" : "#ffe6b3";
            }
            messageTimer = setTimeout(() => {
                if(document.getElementById('statusMsg')) {
                    document.getElementById('statusMsg').innerHTML = "🏹 长按蓄力，恍惚之间瞄准靶心 🏹";
                    document.getElementById('statusMsg').style.color = "#ffe6b3";
                }
            }, 1800);
        }
        
        // 核心射击: 基于蓄力值和瞄准点（带晃动）射出箭矢
        function releaseArrow(pointerX, pointerY) {
            if(isFlying) {
                setMessage("等箭命中再拉弓~", false);
                return false;
            }
            if(!isCharging && power === 0) {
                setMessage("✋ 请长按蓄力再射箭！ ✋", false);
                return false;
            }
            
            // 边界裁剪
            let rawX = Math.min(Math.max(pointerX, 20), canvas.width - 20);
            let rawY = Math.min(Math.max(pointerY, 20), canvas.height - 40);
            
            // 恍惚偏移惩罚: 威力越大晃动越剧烈
            let wobbleFactor = (power / 100) ** 1.2;
            let offsetX = aimOffsetX * 0.9 + (Math.random() - 0.5) * wobbleFactor * 34;
            let offsetY = aimOffsetY * 0.9 + (Math.random() - 0.5) * wobbleFactor * 34;
            let finalX = rawX + offsetX;
            let finalY = rawY + offsetY;
            
            // 命中判定
            let hitIndex = -1;
            let minDist = 999;
            for(let i = 0; i < targets.length; i++) {
                const t = targets[i];
                if(t.hit) continue;
                let dist = Math.hypot(finalX - t.x, finalY - t.y);
                let hitRadius = t.radius + 4 + (power / 100) * 20;
                if(dist < hitRadius && dist < minDist) {
                    minDist = dist;
                    hitIndex = i;
                }
            }
            
            let gainedPoints = 0;
            if(hitIndex !== -1) {
                const t = targets[hitIndex];
                if(!t.hit) {
                    t.hit = true;
                    let centerDist = Math.hypot(finalX - t.x, finalY - t.y);
                    let accuracy = Math.max(0, 1 - (centerDist / t.radius));
                    let basePoints = Math.floor(8 + accuracy * 24);
                    let powerBonus = Math.floor(power / 12);
                    gainedPoints = basePoints + powerBonus;
                    gainedPoints = Math.min(gainedPoints, 58);
                    score += gainedPoints;
                    updateScoreUI();
                    setMessage(`🎯 正中靶心！ +${gainedPoints} 分 (威力${power}%) 🎯`, false);
                    hitEffect.active = true;
                    hitEffect.x = t.x;
                    hitEffect.y = t.y;
                    hitEffect.timer = 12;
                }
            } else {
                setMessage(`💨 脱靶... 威力${power}% 恍惚射偏了 💨`, true);
                hitEffect.active = false;
            }
            
            // 箭矢飞行动画
            arrowFlight.active = true;
            arrowFlight.startX = archerX;
            arrowFlight.startY = archerY;
            arrowFlight.targetX = finalX;
            arrowFlight.targetY = finalY;
            arrowFlight.progress = 0;
            arrowFlight.hitTargetIdx = hitIndex;
            isFlying = true;
            
            // 蓄力结束重置
            cancelCharge();
            power = 0;
            updatePowerUI(0);
            aimOffsetX = 0;
            aimOffsetY = 0;
            return true;
        }
        
        // 更新恍惚晃动效果 (只在蓄力时)
        function updateWobble() {
            if(isCharging && power > 0) {
                let intensity = Math.min(power / 55, 1.5);
                let time = Date.now() / 160;
                let offX = Math.sin(time) * 8 * intensity + Math.cos(time * 2.2) * 5 * intensity;
                let offY = Math.cos(time * 1.5) * 7 * intensity + Math.sin(time * 2.5) * 4 * intensity;
                offX += (Math.random() - 0.5) * intensity * 4;
                offY += (Math.random() - 0.5) * intensity * 4;
                aimOffsetX = offX;
                aimOffsetY = offY;
            } else {
                aimOffsetX *= 0.94;
                aimOffsetY *= 0.94;
                if(Math.abs(aimOffsetX) < 0.3) aimOffsetX = 0;
                if(Math.abs(aimOffsetY) < 0.3) aimOffsetY = 0;
            }
        }
        
        // ------------------- 绘图 -------------------
        function drawSkyAndGround() {
            let gradSky = ctx.createLinearGradient(0, 0, 0, 280);
            gradSky.addColorStop(0, "#c9e4ff");
            gradSky.addColorStop(1, "#d4f1f9");
            ctx.fillStyle = gradSky;
            ctx.fillRect(0, 0, canvas.width, 280);
            ctx.fillStyle = "#7cb518";
            ctx.fillRect(0, 280, canvas.width, canvas.height - 280);
            for(let i=0; i<70; i++) {
                ctx.beginPath();
                let x = (i * 27) % canvas.width;
                let y = 400 + Math.sin(i * 0.6) * 7;
                ctx.moveTo(x, y);
                ctx.lineTo(x-7, y+24);
                ctx.lineTo(x+7, y+24);
                ctx.fillStyle = "#437c17";
                ctx.fill();
            }
            ctx.fillStyle = "#f9f3cfcc";
            ctx.beginPath(); ctx.ellipse(180, 100, 50, 32, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#e0bc7caa";
            ctx.beginPath(); ctx.ellipse(780, 80, 70, 40, 0, 0, Math.PI*2); ctx.fill();
        }
        
        function drawArcher() {
            ctx.save();
            ctx.beginPath();
            ctx.arc(archerX-12, archerY-12, 18, 0, Math.PI*2);
            ctx.fillStyle = "#ffcd94";
            ctx.fill();
            ctx.fillStyle = "#6b3e1c";
            ctx.fillRect(archerX-25, archerY-8, 40, 28);
            ctx.fillStyle = "#34200c";
            ctx.fillRect(archerX-12, archerY-18, 12, 32);
            ctx.beginPath();
            ctx.ellipse(archerX+6, archerY-12, 20, 9, -0.4, 0, Math.PI*2);
            ctx.strokeStyle = "#b97f44";
            ctx.lineWidth = 7;
            ctx.stroke();
            ctx.fillStyle = "#e0a14b";
            ctx.beginPath();
            ctx.moveTo(archerX+8, archerY-22);
            ctx.lineTo(archerX+26, archerY-14);
            ctx.lineTo(archerX+10, archerY-6);
            ctx.fill();
            ctx.restore();
        }
        
        function drawTargets() {
            for(let t of targets) {
                if(t.hit) continue;
                ctx.save();
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.radius, 0, Math.PI*2);
                ctx.fillStyle = "#b5651e";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.radius-6, 0, Math.PI*2);
                ctx.fillStyle = "#eac086";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.radius-12, 0, Math.PI*2);
                ctx.fillStyle = "#b3413a";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(t.x, t.y, 9, 0, Math.PI*2);
                ctx.fillStyle = "#f9d66c";
                ctx.fill();
                ctx.font = "bold 20px monospace";
                ctx.fillStyle = "white";
                ctx.fillText("🎯", t.x-13, t.y-13);
                ctx.restore();
            }
        }
        
        function drawSight(centerX, centerY) {
            let drawX = centerX + aimOffsetX;
            let drawY = centerY + aimOffsetY;
            ctx.save();
            ctx.beginPath();
            ctx.arc(drawX, drawY, 16, 0, Math.PI*2);
            ctx.strokeStyle = "#fff9c4";
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(drawX-28, drawY);
            ctx.lineTo(drawX-12, drawY);
            ctx.moveTo(drawX+12, drawY);
            ctx.lineTo(drawX+28, drawY);
            ctx.moveTo(drawX, drawY-28);
            ctx.lineTo(drawX, drawY-12);
            ctx.moveTo(drawX, drawY+12);
            ctx.lineTo(drawX, drawY+28);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(drawX, drawY, 6, 0, Math.PI*2);
            ctx.fillStyle = "#ffd966cc";
            ctx.fill();
            if(isCharging && power > 0) {
                ctx.beginPath();
                ctx.arc(drawX, drawY, 22 + power/14, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(255, 180, 40, ${0.4+power/150})`;
                ctx.lineWidth = 5;
                ctx.stroke();
            }
            ctx.restore();
        }
        
        function drawFlyingArrow() {
            if(!arrowFlight.active) return;
            let p = arrowFlight.progress;
            let x = arrowFlight.startX + (arrowFlight.targetX - arrowFlight.startX) * p;
            let y = arrowFlight.startY + (arrowFlight.targetY - arrowFlight.startY) * p;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.atan2(arrowFlight.targetY - arrowFlight.startY, arrowFlight.targetX - arrowFlight.startX));
            ctx.fillStyle = "#c97e3a";
            ctx.fillRect(0, -3, 24, 6);
            ctx.fillStyle = "#ac4e2b";
            ctx.beginPath(); ctx.moveTo(24,0); ctx.lineTo(32,-4); ctx.lineTo(32,4); ctx.fill();
            ctx.restore();
        }
        
        function drawHitEffect() {
            if(hitEffect.active && hitEffect.timer > 0) {
                ctx.beginPath();
                ctx.arc(hitEffect.x, hitEffect.y, 26, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 200, 60, 0.7)`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(hitEffect.x, hitEffect.y, 14, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 70, 20, 0.9)`;
                ctx.fill();
                hitEffect.timer--;
                if(hitEffect.timer <= 0) hitEffect.active = false;
            }
        }
        
        function updateFlight() {
            if(arrowFlight.active) {
                arrowFlight.progress += 0.045;
                if(arrowFlight.progress >= 1.0) {
                    arrowFlight.active = false;
                    isFlying = false;
                }
            }
        }
        
        function drawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawSkyAndGround();
            drawTargets();
            drawArcher();
            drawFlyingArrow();
            drawHitEffect();
            drawSight(aimX, aimY);
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#fef0cf";
            ctx.shadowBlur = 3;
            ctx.fillText("⚡ 长按蓄力 · 威力越大晃动越剧烈 ⚡", 30, 48);
        }
        
        // 获取canvas坐标 (支持移动端touch)
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches) {
                if(e.touches.length === 0) return null;
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(canvasX, 10), canvas.width - 10);
            canvasY = Math.min(Math.max(canvasY, 15), canvas.height - 30);
            return { mx: canvasX, my: canvasY };
        }
        
        // ---- 触摸 / 鼠标 事件彻底阻止默认行为 ----
        function onPointerStart(e) {
            e.preventDefault();
            e.stopPropagation();
            if(isFlying) return;
            cancelCharge();
            const coords = getCanvasCoords(e);
            if(coords) {
                aimX = coords.mx;
                aimY = coords.my;
            }
            isCharging = true;
            power = 0;
            updatePowerUI(0);
            chargeStartTime = Date.now();
            setMessage("🏹 蓄力中！ 恍惚晃动 威力上升 🏹");
            if(navigator.vibrate) navigator.vibrate(15);
            // 额外防止滚动
            return false;
        }
        
        function onPointerMove(e) {
            e.preventDefault();
            e.stopPropagation();
            const coords = getCanvasCoords(e);
            if(coords) {
                aimX = coords.mx;
                aimY = coords.my;
            }
        }
        
        function onPointerEnd(e) {
            e.preventDefault();
            e.stopPropagation();
            if(!isCharging) return;
            if(isFlying) {
                cancelCharge();
                return;
            }
            const coords = getCanvasCoords(e);
            if(coords) {
                releaseArrow(coords.mx, coords.my);
            } else {
                releaseArrow(aimX, aimY);
            }
            isCharging = false;
            if(navigator.vibrate) navigator.vibrate(10);
        }
        
        function attachEvents() {
            canvas.addEventListener('mousedown', onPointerStart);
            window.addEventListener('mousemove', onPointerMove);
            window.addEventListener('mouseup', onPointerEnd);
            
            canvas.addEventListener('touchstart', onPointerStart, { passive: false });
            canvas.addEventListener('touchmove', onPointerMove, { passive: false });
            canvas.addEventListener('touchend', onPointerEnd);
            canvas.addEventListener('touchcancel', onPointerEnd);
            // 彻底禁止从canvas出发的鼠标右键/长按菜单
            canvas.addEventListener('contextmenu', (e) => { e.preventDefault(); return false; });
        }
        
        // 动画循环
        function updateFrame(now) {
            updateWobble();
            if(isCharging) {
                updateCharge(now);
            }
            updateFlight();
            drawAll();
            requestAnimationFrame(updateFrame);
        }
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            resetGame();
            isFlying = false;
            arrowFlight.active = false;
            cancelCharge();
            setMessage("🌿 草原焕新！长按拉弓再试锋芒 🌿");
        });
        
        function init() {
            resetGame();
            attachEvents();
            requestAnimationFrame(updateFrame);
        }
        
        init();
    })();
</script>
</body>
</html>
